<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Admin - Catasto Segnaletica</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #5568d3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        .info strong {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Reset Admin</h1>
        <p class="subtitle">Resetta la password dell'utente admin</p>
        
        <div class="info">
            <strong>⚠️ Attenzione:</strong> Questo endpoint è temporaneo. Dopo aver resettato la password, 
            rimuovi o disabilita questo endpoint per sicurezza.
        </div>

        <div class="form-group">
            <label for="apiUrl">URL del Backend (Render):</label>
            <input type="text" id="apiUrl" placeholder="https://catasto-segnaletica.onrender.com" 
                   value="https://catasto-segnaletica.onrender.com">
        </div>

        <div class="form-group">
            <label for="secret">Secret Key:</label>
            <input type="text" id="secret" placeholder="reset-admin-2024" 
                   value="reset-admin-2024">
            <small style="color: #666;">Default: reset-admin-2024 (cambia nel codice se necessario)</small>
        </div>

        <div class="form-group">
            <label for="password">Nuova Password Admin:</label>
            <input type="password" id="password" placeholder="admin123" value="admin123">
        </div>

        <button id="resetBtn" onclick="resetAdmin()">🔄 Reset Admin</button>

        <div id="message" class="message"></div>
    </div>

    <script>
        async function resetAdmin() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const secret = document.getElementById('secret').value.trim();
            const password = document.getElementById('password').value.trim();
            const btn = document.getElementById('resetBtn');
            const messageDiv = document.getElementById('message');

            if (!apiUrl || !secret || !password) {
                showMessage('Per favore compila tutti i campi', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Reset in corso...';
            messageDiv.style.display = 'none';

            try {
                const response = await fetch(`${apiUrl}/api/auth/reset-admin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        secret: secret,
                        password: password
                    })
                });

                // Controlla se la risposta è HTML invece di JSON
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('text/html')) {
                    throw new Error('Il server ha restituito HTML invece di JSON. Verifica che:\n1. Il codice sia stato deployato su Render\n2. L\'URL del backend sia corretto\n3. Il server sia online');
                }

                const data = await response.json();

                if (response.ok) {
                    showMessage(
                        `✅ ${data.message}\n\n` +
                        `Username: ${data.username}\n` +
                        `Password: ${data.password}\n\n` +
                        `Puoi ora fare login con queste credenziali!`,
                        'success'
                    );
                } else {
                    showMessage(`❌ Errore: ${data.error || 'Errore sconosciuto'}`, 'error');
                }
            } catch (error) {
                showMessage(`❌ Errore di connessione: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 Reset Admin';
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
