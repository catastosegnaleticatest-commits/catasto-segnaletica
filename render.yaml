services:
  - type: web
    name: catasto-segnaletica
    runtime: node
    plan: free
    buildCommand: npm install --ignore-scripts && npm rebuild better-sqlite3 bcrypt && npm run build:cloud
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CATASTO_DATA_DIR
        value: /tmp/catasto-data
      - key: CATASTO_DIST_DIR
        value: ./dist
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
